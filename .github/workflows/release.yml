name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          libc6-dev-armhf-cross \
          libcurl4-openssl-dev \
          libjson-c-dev \
          libsqlite3-dev \
          libssl-dev \
          debhelper \
          fakeroot \
          qemu-user-static \
          binfmt-support
          
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Build
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=arm \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -DVERSION=${{ steps.get_version.outputs.VERSION }}
        make -j$(nproc)
        
    - name: Create Debian package
      run: |
        cd build
        make package
        
        # Rename package with version
        for pkg in *.deb; do
          mv "$pkg" "mimiclaw-orangepi-v${{ steps.get_version.outputs.VERSION }}.deb"
        done
        
    - name: Create release archive
      run: |
        tar czvf "mimiclaw-orangepi-v${{ steps.get_version.outputs.VERSION }}.tar.gz" \
          --exclude='.git' \
          --exclude='build' \
          .
          
    - name: Generate changelog
      run: |
        echo "## Changelog" > CHANGELOG.md
        git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD~1)..HEAD >> CHANGELOG.md || \
        git log --pretty=format:"- %s (%h)" -20 >> CHANGELOG.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: CHANGELOG.md
        files: |
          build/mimiclaw-orangepi-v*.deb
          mimiclaw-orangepi-v*.tar.gz
        generate_release_notes: true
        
  build-docker:
    runs-on: ubuntu-latest
    needs: build-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mimiclaw-orangepi:latest
          ${{ secrets.DOCKER_USERNAME }}/mimiclaw-orangepi:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
