name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libsqlite3-dev libcurl4-openssl-dev libssl-dev \
            libjson-c-dev
      
      - name: Build Libraries
        run: |
          make -C libs 2>&1 | tee build.log
        continue-on-error: true
      
      - name: Build Plugins
        run: |
          make -C plugins 2>&1 | tee build.log
        continue-on-error: true
      
      - name: Create Release Archive
        run: |
          mkdir -p release-package
          cp -r libs/build/lib release-package/ 2>/dev/null || true
          cp -r plugins/build release-package/plugins 2>/dev/null || true
          cp -r docs release-package/ 2>/dev/null || true
          cp -r scripts release-package/ 2>/dev/null || true
          cp README.md release-package/ 2>/dev/null || true
          cp LICENSE release-package/ 2>/dev/null || true
          tar -czvf mimiclaw-v${{ github.ref_name }}.tar.gz release-package/
          ls -lh mimiclaw-v${{ github.ref_name }}.tar.gz
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mimiclaw-v${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
